services:
    bot:
        image: dot-ai
        build:
            context: ./dot
            dockerfile: Containerfile
        env_file:
            - ./dot/.env
        environment:
            EVENT_BUS_ADAPTER: ${EVENT_BUS_ADAPTER:-nats}
            NATS_URL: ${NATS_URL:-nats://nats:4222}
            OLLAMA_BASE_URL: http://ollama:11434
            LOG_FILE_PATH: /app/data/logs/dot.log
            OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-dot}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
            METRICS_HOST: 0.0.0.0
            METRICS_PORT: ${METRICS_PORT:-9464}
        depends_on:
            ollama:
                condition: service_started
            nats:
                condition: service_healthy
            tempo:
                condition: service_started
        volumes:
            - dot_data:/app/data
        ports:
            - "9464:9464"
        restart: unless-stopped

    discord-ingress:
        build:
            context: ./dot
            dockerfile: Containerfile
        command: [ "node", "dist/src/discordIngressService.js" ]
        env_file:
            - ./dot/.env
        environment:
            EVENT_BUS_ADAPTER: ${EVENT_BUS_ADAPTER:-nats}
            NATS_URL: ${NATS_URL:-nats://nats:4222}
            OLLAMA_BASE_URL: http://ollama:11434
            LOG_FILE_PATH: /app/data/logs/discord-ingress.log
            OTEL_SERVICE_NAME: ${OTEL_DISCORD_INGRESS_SERVICE_NAME:-dot-discord-ingress}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
            METRICS_HOST: 0.0.0.0
            METRICS_PORT: 9464
        depends_on:
            nats:
                condition: service_healthy
            tempo:
                condition: service_started
        volumes:
            - dot_data:/app/data
        restart: unless-stopped

    discord-egress:
        build:
            context: ./dot
            dockerfile: Containerfile
        command: [ "node", "dist/src/discordEgressService.js" ]
        env_file:
            - ./dot/.env
        environment:
            EVENT_BUS_ADAPTER: ${EVENT_BUS_ADAPTER:-nats}
            NATS_URL: ${NATS_URL:-nats://nats:4222}
            OLLAMA_BASE_URL: http://ollama:11434
            LOG_FILE_PATH: /app/data/logs/discord-egress.log
            OTEL_SERVICE_NAME: ${OTEL_DISCORD_EGRESS_SERVICE_NAME:-dot-discord-egress}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
            METRICS_HOST: 0.0.0.0
            METRICS_PORT: 9464
        depends_on:
            nats:
                condition: service_healthy
            tempo:
                condition: service_started
        volumes:
            - dot_data:/app/data
        restart: unless-stopped

    ollama:
        image: ollama/ollama:latest
        container_name: ollama
        restart: unless-stopped
        ports:
            - "11434:11434"
        volumes:
            - ${HOME}/ollama:/root/.ollama:Z
        devices:
            - nvidia.com/gpu=all

    nats:
        image: docker.io/library/nats:2.10-alpine
        container_name: dot-nats
        restart: unless-stopped
        ports:
            - "4222:4222"
            - "8222:8222"
        healthcheck:
            test: [ "CMD-SHELL", "nc -z 127.0.0.1 4222" ]
            interval: 5s
            timeout: 3s
            retries: 10

    prometheus:
        image: docker.io/prom/prometheus:v3.4.1
        container_name: dot-prometheus
        restart: unless-stopped
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
        ports:
            - "9090:9090"
        volumes:
            - ./dot/ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
            - prometheus_data:/prometheus

    loki:
        image: docker.io/grafana/loki:3.5.3
        container_name: dot-loki
        restart: unless-stopped
        command:
            - -config.file=/etc/loki/config.yml
        ports:
            - "3100:3100"
        volumes:
            - ./dot/ops/observability/loki/config.yml:/etc/loki/config.yml:ro,Z
            - loki_data:/loki

    promtail:
        image: docker.io/grafana/promtail:3.5.3
        container_name: dot-promtail
        restart: unless-stopped
        command:
            - -config.file=/etc/promtail/config.yml
        depends_on:
            loki:
                condition: service_started
        volumes:
            - ./dot/ops/observability/promtail/config.yml:/etc/promtail/config.yml:ro,Z
            - dot_data:/var/lib/dot-data:ro
            - promtail_data:/tmp/promtail

    tempo:
        image: docker.io/grafana/tempo:2.8.2
        container_name: dot-tempo
        restart: unless-stopped
        command:
            - -config.file=/etc/tempo/config.yml
        ports:
            - "3200:3200"
            - "4318:4318"
        volumes:
            - ./dot/ops/observability/tempo/config.yml:/etc/tempo/config.yml:ro,Z
            - tempo_data:/var/tempo

    grafana:
        image: docker.io/grafana/grafana-oss:12.1.1
        container_name: dot-grafana
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
        depends_on:
            prometheus:
                condition: service_started
            loki:
                condition: service_started
            tempo:
                condition: service_started
        volumes:
            - ./dot/ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro,Z
            - ./dot/ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
            - grafana_data:/var/lib/grafana

volumes:
    dot_data:
    grafana_data:
    loki_data:
    prometheus_data:
    promtail_data:
    tempo_data:
