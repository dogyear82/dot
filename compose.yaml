services:
  bot:
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    depends_on:
      - ollama
    volumes:
      - dot_data:/app/data
    restart: unless-stopped
    
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${HOME}/ollama:/root/.ollama:Z
    devices:
      - nvidia.com/gpu=all

volumes:
  dot_data:
