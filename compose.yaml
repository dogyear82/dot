services:
  bot:
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    environment:
      EVENT_BUS_ADAPTER: ${EVENT_BUS_ADAPTER:-nats}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
      nats:
        condition: service_healthy
    volumes:
      - dot_data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${HOME}/ollama:/root/.ollama:Z
    devices:
      - nvidia.com/gpu=all

  nats:
    image: docker.io/library/nats:2.10-alpine
    container_name: dot-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dot_data:
