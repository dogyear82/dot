server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: dot-file-logs
    static_configs:
      - targets: ["localhost"]
        labels:
          job: dot
          service: dot
          __path__: /var/lib/dot-data/logs/*.log
