global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dot-bot
    static_configs:
      - targets: ["bot:9464"]

  - job_name: dot-mail-sync
    static_configs:
      - targets: ["mail-sync:9464"]

  - job_name: dot-mail-triage
    static_configs:
      - targets: ["mail-triage:9464"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
